<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0EA5E9">
  <meta name="description" content="FieldFlow — Visualisation des opérations terrain avec cartographie interactive">
  <title>FieldFlow — Visualisation Terrain</title>

  <link rel="stylesheet" href="css/styles.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Source+Serif+4:wght@600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <a href="#main-content" class="skip-link">Aller au contenu principal</a>

  <div class="app-layout" id="layout">

    <!-- ========== SIDEBAR ========== -->
    <aside class="sidebar" id="sidebar" role="complementary" aria-label="Panneau de contrôle">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <i class="fa-solid fa-layer-group" aria-hidden="true"></i>
          <span>FieldFlow</span>
        </div>
        <span class="sidebar-version" aria-label="Version">v1.0</span>
      </div>

      <!-- Stats summary -->
      <section class="sidebar-stats" aria-label="Résumé des données">
        <div class="stats-grid">
          <button class="stat-card stat-card--campaigns" data-filter="campaign" aria-label="Campagnes: filtrez par campagnes">
            <div class="stat-card-header">
              <i class="fa-solid fa-bullhorn" aria-hidden="true"></i>
              <span class="stat-card-count" id="stat-campaigns">0</span>
            </div>
            <span class="stat-card-label">Campagnes</span>
          </button>
          <button class="stat-card stat-card--customers" data-filter="customer" aria-label="Bénéficiaires: filtrez par bénéficiaires">
            <div class="stat-card-header">
              <i class="fa-solid fa-people-group" aria-hidden="true"></i>
              <span class="stat-card-count" id="stat-customers">0</span>
            </div>
            <span class="stat-card-label">Bénéficiaires</span>
          </button>
          <button class="stat-card stat-card--meetings" data-filter="meeting" aria-label="Réunions: filtrez par réunions">
            <div class="stat-card-header">
              <i class="fa-solid fa-calendar-check" aria-hidden="true"></i>
              <span class="stat-card-count" id="stat-meetings">0</span>
            </div>
            <span class="stat-card-label">Réunions</span>
          </button>
        </div>
      </section>

      <!-- Filter row -->
      <div class="sidebar-filters" role="group" aria-label="Filtres par type">
        <button class="filter-btn filter-btn--active" data-filter="all">
          <i class="fa-solid fa-globe" aria-hidden="true"></i> Tous
        </button>
        <button class="filter-btn" data-filter="campaign">
          <i class="fa-solid fa-bullhorn" aria-hidden="true"></i> Campagnes
        </button>
        <button class="filter-btn" data-filter="customer">
          <i class="fa-solid fa-people-group" aria-hidden="true"></i> Bénéficiaires
        </button>
        <button class="filter-btn" data-filter="meeting">
          <i class="fa-solid fa-calendar-check" aria-hidden="true"></i> Réunions
        </button>
      </div>

      <!-- Search -->
      <div class="sidebar-search">
        <label for="search-input" class="sr-only">Rechercher</label>
        <i class="fa-solid fa-magnifying-glass search-icon" aria-hidden="true"></i>
        <input
          type="text"
          id="search-input"
          class="search-input"
          placeholder="Rechercher un lieu, un nom..."
          autocomplete="off"
        >
        <button class="search-clear" id="search-clear" aria-label="Effacer la recherche" hidden>
          <i class="fa-solid fa-xmark" aria-hidden="true"></i>
        </button>
      </div>

      <!-- Form toggle buttons -->
      <div class="sidebar-tabs" role="tablist" aria-label="Ajouter une entrée">
        <button class="sidebar-tab sidebar-tab--active" role="tab" aria-selected="true" data-form="campaign" id="tab-campaign">
          <i class="fa-solid fa-bullhorn" aria-hidden="true"></i> Campagne
        </button>
        <button class="sidebar-tab" role="tab" aria-selected="false" data-form="customer" id="tab-customer">
          <i class="fa-solid fa-people-group" aria-hidden="true"></i> Bénéficiaire
        </button>
        <button class="sidebar-tab" role="tab" aria-selected="false" data-form="meeting" id="tab-meeting">
          <i class="fa-solid fa-calendar-check" aria-hidden="true"></i> Réunion
        </button>
      </div>

      <!-- Forms -->
      <div class="sidebar-form-container" id="form-container">
        <!-- Campaign Form -->
        <form class="entry-form entry-form--active" id="form-campaign" novalidate autocomplete="off">
          <input type="hidden" name="type" value="campaign">
          <div class="form-group">
            <label for="camp-title">Nom de la campagne <span class="required" aria-hidden="true">*</span></label>
            <input type="text" id="camp-title" name="title" required placeholder="Ex: Distribution Goma Nord" maxlength="128">
            <span class="form-error" role="alert"></span>
          </div>
          <div class="form-group">
            <label for="camp-desc">Description</label>
            <textarea id="camp-desc" name="description" rows="2" placeholder="Objectifs et détails de la campagne..." maxlength="512"></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="camp-start">Date de début <span class="required" aria-hidden="true">*</span></label>
              <input type="date" id="camp-start" name="startDate" required>
              <span class="form-error" role="alert"></span>
            </div>
            <div class="form-group">
              <label for="camp-end">Date de fin</label>
              <input type="date" id="camp-end" name="endDate">
            </div>
          </div>
          <div class="form-group">
            <label for="camp-address">Adresse / Lieu <span class="required" aria-hidden="true">*</span></label>
            <input type="text" id="camp-address" name="address" required placeholder="Ville, quartier, zone..." maxlength="256">
            <span class="form-error" role="alert"></span>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="camp-lat">Latitude <span class="required" aria-hidden="true">*</span></label>
              <input type="number" id="camp-lat" name="lat" required step="any" placeholder="-1.6585" min="-90" max="90">
              <span class="form-error" role="alert"></span>
            </div>
            <div class="form-group">
              <label for="camp-lng">Longitude <span class="required" aria-hidden="true">*</span></label>
              <input type="number" id="camp-lng" name="lng" required step="any" placeholder="29.2201" min="-180" max="180">
              <span class="form-error" role="alert"></span>
            </div>
          </div>
          <div class="form-group">
            <label for="camp-budget">Budget (USD)</label>
            <input type="number" id="camp-budget" name="budget" placeholder="5000" min="0" step="100">
          </div>
          <div class="form-group">
            <label for="camp-status">Statut</label>
            <select id="camp-status" name="status">
              <option value="active">Active</option>
              <option value="planned">Planifiée</option>
              <option value="completed">Terminée</option>
            </select>
          </div>
          <button type="submit" class="btn btn--primary btn--full">
            <i class="fa-solid fa-plus" aria-hidden="true"></i> Ajouter la campagne
          </button>
        </form>

        <!-- Customer Form -->
        <form class="entry-form" id="form-customer" novalidate autocomplete="off">
          <input type="hidden" name="type" value="customer">
          <div class="form-group">
            <label for="cust-name">Nom complet <span class="required" aria-hidden="true">*</span></label>
            <input type="text" id="cust-name" name="title" required placeholder="Ex: Jean-Pierre Banza" maxlength="128">
            <span class="form-error" role="alert"></span>
          </div>
          <div class="form-group">
            <label for="cust-contact">Téléphone / Contact</label>
            <input type="text" id="cust-contact" name="contact" placeholder="+243 8XX XXX XXX" maxlength="32">
          </div>
          <div class="form-group">
            <label for="cust-desc">Notes</label>
            <textarea id="cust-desc" name="description" rows="2" placeholder="Informations sur le ménage, besoins..." maxlength="512"></textarea>
          </div>
          <div class="form-group">
            <label for="cust-address">Adresse <span class="required" aria-hidden="true">*</span></label>
            <input type="text" id="cust-address" name="address" required placeholder="Village, quartier..." maxlength="256">
            <span class="form-error" role="alert"></span>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="cust-lat">Latitude <span class="required" aria-hidden="true">*</span></label>
              <input type="number" id="cust-lat" name="lat" required step="any" placeholder="-1.6585" min="-90" max="90">
              <span class="form-error" role="alert"></span>
            </div>
            <div class="form-group">
              <label for="cust-lng">Longitude <span class="required" aria-hidden="true">*</span></label>
              <input type="number" id="cust-lng" name="lng" required step="any" placeholder="29.2201" min="-180" max="180">
              <span class="form-error" role="alert"></span>
            </div>
          </div>
          <div class="form-group">
            <label for="cust-status">Statut</label>
            <select id="cust-status" name="status">
              <option value="active">Actif</option>
              <option value="pending">En attente</option>
              <option value="verified">Vérifié</option>
              <option value="completed">Complété</option>
            </select>
          </div>
          <button type="submit" class="btn btn--primary btn--full">
            <i class="fa-solid fa-plus" aria-hidden="true"></i> Ajouter le bénéficiaire
          </button>
        </form>

        <!-- Meeting Form -->
        <form class="entry-form" id="form-meeting" novalidate autocomplete="off">
          <input type="hidden" name="type" value="meeting">
          <div class="form-group">
            <label for="meet-title">Objet de la réunion <span class="required" aria-hidden="true">*</span></label>
            <input type="text" id="meet-title" name="title" required placeholder="Ex: Coordination hebdomadaire" maxlength="128">
            <span class="form-error" role="alert"></span>
          </div>
          <div class="form-group">
            <label for="meet-organizer">Organisateur</label>
            <input type="text" id="meet-organizer" name="organizer" placeholder="Nom de l'organisateur" maxlength="64">
          </div>
          <div class="form-group">
            <label for="meet-desc">Description</label>
            <textarea id="meet-desc" name="description" rows="2" placeholder="Ordre du jour, sujets à traiter..." maxlength="512"></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="meet-date">Date <span class="required" aria-hidden="true">*</span></label>
              <input type="datetime-local" id="meet-date" name="date" required>
              <span class="form-error" role="alert"></span>
            </div>
            <div class="form-group">
              <label for="meet-duration">Durée (min)</label>
              <input type="number" id="meet-duration" name="duration" placeholder="60" min="15" max="480" step="15">
            </div>
          </div>
          <div class="form-group">
            <label for="meet-attendees">Participants</label>
            <input type="number" id="meet-attendees" name="attendees" placeholder="10" min="1" max="500">
          </div>
          <div class="form-group">
            <label for="meet-address">Lieu <span class="required" aria-hidden="true">*</span></label>
            <input type="text" id="meet-address" name="address" required placeholder="Adresse du lieu de réunion" maxlength="256">
            <span class="form-error" role="alert"></span>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="meet-lat">Latitude <span class="required" aria-hidden="true">*</span></label>
              <input type="number" id="meet-lat" name="lat" required step="any" placeholder="-1.6585" min="-90" max="90">
              <span class="form-error" role="alert"></span>
            </div>
            <div class="form-group">
              <label for="meet-lng">Longitude <span class="required" aria-hidden="true">*</span></label>
              <input type="number" id="meet-lng" name="lng" required step="any" placeholder="29.2201" min="-180" max="180">
              <span class="form-error" role="alert"></span>
            </div>
          </div>
          <div class="form-group">
            <label for="meet-status">Statut</label>
            <select id="meet-status" name="status">
              <option value="upcoming">À venir</option>
              <option value="in-progress">En cours</option>
              <option value="completed">Terminée</option>
            </select>
          </div>
          <button type="submit" class="btn btn--primary btn--full">
            <i class="fa-solid fa-plus" aria-hidden="true"></i> Ajouter la réunion
          </button>
        </form>
      </div>
    </aside>

    <!-- ========== MAP ========== -->
    <main class="map-container" id="main-content" role="main" aria-label="Carte interactive des opérations terrain">
      <div id="map" class="map"></div>

      <!-- Map controls overlay -->
      <div class="map-controls">
        <button class="map-ctrl-btn" id="btn-locate" aria-label="Me localiser" title="Me localiser">
          <i class="fa-solid fa-location-crosshairs" aria-hidden="true"></i>
        </button>
        <button class="map-ctrl-btn" id="btn-zoom-in" aria-label="Zoom avant" title="Zoom avant">
          <i class="fa-solid fa-plus" aria-hidden="true"></i>
        </button>
        <button class="map-ctrl-btn" id="btn-zoom-out" aria-label="Zoom arrière" title="Zoom arrière">
          <i class="fa-solid fa-minus" aria-hidden="true"></i>
        </button>
        <button class="map-ctrl-btn" id="btn-toggle-sidebar" aria-label="Afficher/Masquer le panneau" title="Panneau latéral">
          <i class="fa-solid fa-sidebar" aria-hidden="true"></i>
        </button>
      </div>

      <!-- Connectivity status bar -->
      <div class="connectivity-bar connectivity-bar--online" id="connectivity-bar" role="status" aria-live="polite">
        <span class="connectivity-dot" aria-hidden="true"></span>
        <span id="connectivity-text">En ligne</span>
      </div>

      <!-- Toast notification -->
      <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true" hidden></div>
    </main>
  </div>

  <script src="js/data.js"></script>
  <script src="js/map.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>

  <script async defer src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&loading=async&callback=initApp&libraries=places"></script>
</body>
</html>
